- name: Configure web servers
  hosts: all
  become: true

  tasks:
    - name: Update package cache (Debian/Ubuntu)
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Install nginx
      ansible.builtin.apt:
        name: nginx
        state: present

    - name: Create directory structure for web documents
      ansible.builtin.file:
        path: /web/html
        state: directory
        mode: "0755"

    - name: Copy nginx conf file to server
      ansible.builtin.copy:
        src: files/nginx.conf
        dest: /etc/nginx/sites-available/default
        owner: root
        group: root
        mode: "0644"

    - name: Create link to nginx config file to enable it
      ansible.builtin.file:
        src: /etc/nginx/sites-available/default
        dest: /etc/nginx/sites-enabled/default
        state: link
        force: true

    - name: Generate index.html file from template
      ansible.builtin.template:
        src: templates/index.html.j2
        dest: /web/html/index.html
        owner: root
        group: root
        mode: "0644"

    - name: Reload nginx service and ensure enabled
      ansible.builtin.service:
        name: nginx
        state: reloaded
        enabled: true
